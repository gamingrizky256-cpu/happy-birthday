<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:white;
  overflow:hidden;
}

/* LOCK */
.lock {
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

input {
  padding:10px;
  border-radius:20px;
  border:2px solid pink;
  text-align:center;
}

button {
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
}

/* SLIDE */
.slide {
  display:none;
  width:100%;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

.active {
  display:flex;
}

/* BG */
.bg1 { background:linear-gradient(#fff,#ffe4ec); }
.bg2 { background:linear-gradient(#fff,#ffd6e0); }
.bg3 { background:linear-gradient(#fff,#ffc2d1); }
.bg4 { background:linear-gradient(#fff,#ffb3c6); }

/* TEXT */
h1 { color:#ff4d88; }
p {
  color:#444;
  max-width:700px;
  line-height:1.6;
  white-space:pre-line;
}

/* NOTE */
.note-box {
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:80%;
  max-height:70%;
  overflow:auto;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* FOTO */
.foto {
  width:60%;
  max-width:280px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,105,180,0.3);
}

/* BTN */
.btn {
  margin-top:20px;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" src="lagu.mp3" loop></audio>
<audio id="type" src="type.mp3"></audio>
<audio id="click" src="click.mp3"></audio>

<!-- LOCK -->
<div class="lock" id="lock">
  <h2 style="color:#ff4d88;">type my name 💗</h2>
  <input id="nameInput">
  <button onclick="playClick(); check()">open</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- SLIDES -->
<div class="slide bg1">
  <h1 id="t1"></h1>
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<div class="slide bg2">
  <p id="t2"></p>
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<!-- NOTE -->
<div class="slide bg3">
  <div class="note-box">
    <p id="note"></p>
  </div>
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<div class="slide bg4">
  <p id="t4"></p>
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<!-- FOTO -->
<div class="slide">
  <img src="foto1.jpg" class="foto">
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<div class="slide">
  <img src="foto2.jpg" class="foto">
  <button class="btn" onclick="playClick(); next()">Next</button>
</div>

<!-- LAST -->
<div class="slide">
  <img src="foto3.jpg" class="foto">
  <h1 style="margin-top:20px;">thank you for being in my life 💖</h1>
  <p style="color:#ff4d88;">i love you always 💗</p>
</div>

<script>
let slides=document.querySelectorAll(".slide");
let current=0;

function playClick(){
  let sound=document.getElementById("click");
  sound.currentTime=0;
  sound.play();
}

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function check(){
  let val=document.getElementById("nameInput").value.toUpperCase();
  if(val==="REVA"){
    document.getElementById("lock").style.display="none";
    showSlide(0);
    document.getElementById("music").play();
    type("t1","happy birthday my lovee-!! <3\nits your special dayy 💕");
  }else{
    document.getElementById("error").innerText="salah 😢";
  }
}

function next(){
  if(current < slides.length-1){
    current++;
    showSlide(current);

    if(current==1){
      type("t2","its your special dayy, wish u all the bestt sayang 💖\nselamat bertumbuh jauh lebih baik lagi yaa cintakuu");
    }

    if(current==2){
      type("note",
`its your special dayy, wish u all the bestt sayang.

selamat bertumbuh jauh lebih baik lagi yaa sayangkuuu cintakuu,
panjang umurr, a wish for u on ur birthday,

Apa pun yang kamu minta semoga kamu terima,
apa pun yang kamu cari semoga kamu temukan,
apa pun yang kamu harapkan semoga terpenuhi di hari ulang tahunmu.

kuharap kamu akan menjalani perjalanan ini dengan mengetahui bahwa kamu adalah bagian dari tempat ini,

sayang, kuharap meskipun terkadang hal-hal tidak berjalan sesuai keinginanmu,
kamu tidak akan berhenti mencoba,
kamu tidak akan menyerah pada dirimu sendiri.

dan di hari-hari terberatmu nanti,
kuharap kamu akan selalu mengingatkan dirimu sendiri akan pesan ini:

"kamu pantas mendapatkan yang lebih baik,
kamu layak untuk dicintai dan dirayakan dalam hal apa pun!!!"

Semoga Allah mengabulkan apa yang benar-benar diinginkan hatimu,
semoga Allah mengabulkan segala keinginanmu,
dan mengabulkan semua doa dan harapanmu 🤲

<3`);
    }

    if(current==3){
      type("t4","i'm always here for you 💗");
    }
  }
}

function type(id,text){
  let el=document.getElementById(id);
  el.innerHTML="";
  let i=0;

  function run(){
    if(i<text.length){
      el.innerHTML+=text[i];
      document.getElementById("type").play();
      i++;
      setTimeout(run,25);
    }
  }
  run();
}
</script>

</body>
</html>
